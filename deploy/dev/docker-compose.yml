services:
  backend:
    build:
      context: ../..
      dockerfile: deploy/dev/backend.Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-rsmine}-backend
    environment:
      - RSMINE_SERVER__HOST=${RSMINE_SERVER__HOST:-0.0.0.0}
      - RSMINE_SERVER__PORT=${RSMINE_SERVER__PORT:-3001}
      - RSMINE_SERVER__BASE_URL=${RSMINE_SERVER__BASE_URL:-http://localhost:3001}
      - RSMINE_DATABASE__URL=${RSMINE_DATABASE__URL:-sqlite://data/rsmine.db?mode=rwc}
      - RSMINE_JWT__SECRET=${RSMINE_JWT__SECRET:-dev-secret-key-change-in-production}
      - RSMINE_STORAGE__PATH=${RSMINE_STORAGE__PATH:-./data/files}
      - RSMINE_LOGGING__LEVEL=${RSMINE_LOGGING__LEVEL:-debug}
      - RSMINE_LOGGING__FORMAT=${RSMINE_LOGGING__FORMAT:-text}
    ports:
      - "${RSMINE_SERVER__PORT:-3001}:${RSMINE_SERVER__PORT:-3001}"
    volumes:
      - ../../backend:/app:cached
      - rsmine_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://127.0.0.1:${RSMINE_SERVER__PORT:-3001}/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    labels:
      - "com.docker.compose.project=${COMPOSE_PROJECT_NAME:-rsmine}"

volumes:
  rsmine_data:
    name: ${COMPOSE_PROJECT_NAME:-rsmine}_data

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME:-rsmine}_default
