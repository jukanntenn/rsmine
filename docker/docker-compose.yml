services:
  rsmine-db:
    image: postgres:16-alpine
    container_name: rsmine-db
    environment:
      POSTGRES_DB: rsmine
      POSTGRES_USER: rsmine
      POSTGRES_PASSWORD: rsmine
    volumes:
      - rsmine-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rsmine -d rsmine"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rsmine-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: rsmine-api
    environment:
      RSMINE__DATABASE__URL: "postgres://rsmine:rsmine@rsmine-db:5432/rsmine"
    volumes:
      - ../backend/config.toml:/app/config.toml:ro
      - rsmine-api-data:/app/data
    ports:
      - "3001:3001"
    depends_on:
      rsmine-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  rsmine-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        BACKEND_URL: "http://rsmine-api:3001"
    container_name: rsmine-web
    environment:
      BACKEND_URL: "http://rsmine-api:3001"
    ports:
      - "3000:3000"
    depends_on:
      rsmine-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  rsmine-db-data:
  rsmine-api-data:
